name: Manadoksli Universe

services:
  manadoksli-svc:
    image: hakimamarullah/manadoksli-svc:latest
    pull_policy: always
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 20
        window: 120s
    ports:
      - "9898:8080"
    volumes:
      - ./logs:/opt/app/logs
      - ./uploads:/opt/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 3s
      timeout: 10s
      retries: 20
    env_file:
      - .env.local
    environment:
      - JAVA_OPTS=-Dspring.profiles.active=local
    networks:
      - manadoksli-network

networks:
  manadoksli-network:
    driver: bridge