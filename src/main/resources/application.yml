spring:
  application:
    name: manadoksli-svc
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME}
    password: ${ELASTICSEARCH_PASSWORD}
  mvc:
    apiversion:
      use:
        header: Api-Version

server:
  port: 9898

storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY}
  secret-key: ${STORAGE_SECRET_KEY}
  bucket: ${STORAGE_BUCKET:manadoksli}
  public-url: ${STORAGE_PUBLIC_URL:http://localhost:9000}
  region: us-east-1

ocr:
  api-key: ${OCR_API_KEY}
  url: https://api.ocr.space/parse/image

logging:
  level:
    com.manadoksli.service.impl.OcrSvc: INFO

management:
  opentelemetry:
    resource-attributes:
      service.name: manadoksli-svc
  health:
    rabbit:
      enabled: ${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
    baggage:
      correlation:
        enabled: true
    sampling:
      probability: 1.0
    propagation:
      consume: W3C, B3, B3_MULTI
      produce: W3C
